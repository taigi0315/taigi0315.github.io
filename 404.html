<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | Changik Choi</title>
  <link rel="stylesheet" href="/assets/css/style.css">
  <link rel="icon" href="/favicon.ico" sizes="any">
</head>
<body>
  <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;background:linear-gradient(135deg,#ffffff 0%,#f0f4ff 100%);">
    <p style="font-size:.875rem;font-weight:500;color:var(--color-accent);letter-spacing:.1em;text-transform:uppercase;margin-bottom:1rem;">404</p>
    <h1 style="font-family:'Fira Sans',-apple-system,sans-serif;font-size:clamp(2rem,5vw,3rem);font-weight:700;color:#1a1a2e;margin-bottom:1rem;letter-spacing:-.02em;">Page not found</h1>
    <p style="color:#6c757d;font-size:1.125rem;max-width:400px;line-height:1.7;margin-bottom:2rem;">
      The page you're looking for doesn't exist or has been moved.
    </p>
    <a href="/" style="display:inline-flex;align-items:center;gap:.5rem;background:#2563eb;color:#fff;padding:.75rem 1.5rem;border-radius:8px;font-size:.875rem;font-weight:500;text-decoration:none;transition:background .2s ease;" onmouseover="this.style.background='#1d4ed8'" onmouseout="this.style.background='#2563eb'">
      Return to portfolio
    </a>
  </div>
</body>
</html>
